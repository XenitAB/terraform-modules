{{- if .Values.spotInstancesHack.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  labels:
    name: xks
    xkf.xenit.io/kind: platform
  name: xks
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xks-ds-account
  namespace: xks
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: xks-ds-node-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:node
subjects:
- kind: ServiceAccount
  name: xks-ds-account
  namespace: xks
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: xks:webhooks
rules:
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - validatingwebhookconfigurations
  verbs:
  - get
  - list
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: xks-ds-webhook-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: xks:webhooks
subjects:
- kind: ServiceAccount
  name: xks-ds-account
  namespace: xks
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: xks-spot-instances
  namespace: xks
  labels:
    k8s-app: xks-spot-instances
spec:
  selector:
    matchLabels:
      name: xks-spot-instances
  template:
    metadata:
      labels:
        name: xks-spot-instances
    spec:
      serviceAccountName: xks-ds-account
      tolerations:
      - key: kubernetes.azure.com/scalesetpriority
        operator: Exists
        effect: NoSchedule
      containers:
      - name: busybox
        image: cgr.dev/chainguard/busybox@sha256:f9ca35446158a61c6fc535fa3154d0378af13800834c46ade63c94f1fc25d839
        command: 
         - "sh"
         - "-c"
         - "sleep infinity"
      initContainers:
      - name: kubectl-patch
        image: cgr.dev/chainguard/kubectl@sha256:f6917be5d911e65bf1bc7935351a5646858af3919384359997c3682bb2b29cc3
        command:
          - kubectl
          - patch
          - ValidatingWebhookConfiguration
          - aks-node-validating-webhook
          - '--type=json'
          - '-p'
          - >-
            [{"op": "replace", "path": "/webhooks/0/rules/0/operations/0",
            "value":"CREATE"}]
      - name: kubectl-taint
        image: cgr.dev/chainguard/kubectl@sha256:f6917be5d911e65bf1bc7935351a5646858af3919384359997c3682bb2b29cc3
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
          - kubectl
          - taint
          - nodes
          - "$(NODE_NAME)"
          - "kubernetes.azure.com/scalesetpriority=spot:NoSchedule-"
      nodeSelector:
        kubernetes.azure.com/scalesetpriority: spot
{{- end }}

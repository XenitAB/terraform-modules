version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "terraform"
    directories:
      - "/modules/*"
      - "/validation/*"
    schedule:
      interval: "weekly"
  - package-ecosystem: "opentofu"
    directories:
      - "/modules/*"
      - "/validation/*"
    schedule:
      interval: "weekly"
